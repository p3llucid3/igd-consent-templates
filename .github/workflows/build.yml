name: Build igd-master.json

on:
  push:
    paths:
      - "sources/**"
      - "scripts/build.py"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build igd-master.json
        run: python3 scripts/build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- igd-master.json; then
            echo "No changes to igd-master.json"
          else
            git add igd-master.json
            git commit -m "Auto-build igd-master.json from sources/ [skip ci]"
            git push
          fi
